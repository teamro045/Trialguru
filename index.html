<!DOCTYPE html>
<html lang="en">
<head>
<title>TG-SAMARTH</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- HLS & PLYR -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css">
<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    font-family: sans-serif;
}

/* GOLDEN NEON PLAYER */
:root {
    --plyr-color-main: #ffd700;
}

.plyr {
    height: 100%;
    width: 100%;
}

/* LOADING SCREEN */
.loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 9999;
}

.loading-text {
    position: absolute;
    inset: 0;
    margin: auto;
    text-align: center;
    height: 100px;
    line-height: 100px;
}

/* GOLDEN NEON TEXT */
.loading-text span {
    display: inline-block;
    margin: 0 4px;
    color: #ffd700;
    font-size: 32px;
    text-shadow:
        0 0 5px #ffd700,
        0 0 10px #ffcc33,
        0 0 20px #ffb700,
        0 0 40px #ffaa00;
}

/* BLUR WAVE ANIMATION */
.loading-text span:nth-child(1) { animation: blur-text 1.5s 0s infinite alternate; }
.loading-text span:nth-child(2) { animation: blur-text 1.5s 0.2s infinite alternate; }
.loading-text span:nth-child(3) { animation: blur-text 1.5s 0.4s infinite alternate; }
.loading-text span:nth-child(4) { animation: blur-text 1.5s 0.6s infinite alternate; }
.loading-text span:nth-child(5) { animation: blur-text 1.5s 0.8s infinite alternate; }
.loading-text span:nth-child(6) { animation: blur-text 1.5s 1s infinite alternate; }
.loading-text span:nth-child(7) { animation: blur-text 1.5s 1.2s infinite alternate; }
.loading-text span:nth-child(8) { animation: blur-text 1.5s 1.4s infinite alternate; }
.loading-text span:nth-child(9) { animation: blur-text 1.5s 1.6s infinite alternate; }
.loading-text span:nth-child(10){ animation: blur-text 1.5s 1.8s infinite alternate; }
.loading-text span:nth-child(11){ animation: blur-text 1.5s 2s infinite alternate; }
.loading-text span:nth-child(12){ animation: blur-text 1.5s 2.2s infinite alternate; }
.loading-text span:nth-child(13){ animation: blur-text 1.5s 2.4s infinite alternate; }
.loading-text span:nth-child(14){ animation: blur-text 1.5s 2.6s infinite alternate; }
.loading-text span:nth-child(15){ animation: blur-text 1.5s 2.8s infinite alternate; }
.loading-text span:nth-child(16){ animation: blur-text 1.5s 3s infinite alternate; }
.loading-text span:nth-child(17){ animation: blur-text 1.5s 3.2s infinite alternate; }
.loading-text span:nth-child(18){ animation: blur-text 1.5s 3.4s infinite alternate; }
.loading-text span:nth-child(19){ animation: blur-text 1.5s 3.6s infinite alternate; }
.loading-text span:nth-child(20){ animation: blur-text 1.5s 3.8s infinite alternate; }

@keyframes blur-text {
    0% {
        filter: blur(0px);
        opacity: 1;
    }
    100% {
        filter: blur(3px);
        opacity: 0.8;
    }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loading" class="loading">
    <div class="loading-text">
        <span>T</span><span>E</span><span>A</span><span>M</span>
        <span>R</span><span>O</span><span>H</span><span>I</span><span>T</span>
        <span>O</span><span>F</span><span>F</span><span>I</span><span>C</span><span>I</span><span>A</span><span>L</span>
        <span>4</span><span>5</span>
    </div>
</div>

<!-- VIDEO PLAYER -->
<video id="player" controls autoplay playsinline crossorigin>
    <source src="https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/ts-eu-w1-n2/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3"
            type="application/vnd.apple.mpegurl">
</video>

<script>
/* HIDE LOADER */
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
}, 3000);

/* PLAYER SETUP */
document.addEventListener("DOMContentLoaded", () => {
    const video = document.getElementById("player");
    const source = video.querySelector("source").src;
    const options = {};

    if (Hls.isSupported()) {
        const hls = new Hls({ maxMaxBufferLength: 100 });
        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            const qualities = hls.levels.map(l => l.height);
            options.quality = {
                default: qualities[0],
                options: qualities,
                forced: true,
                onChange: q => {
                    hls.levels.forEach((l, i) => {
                        if (l.height === q) hls.currentLevel = i;
                    });
                }
            };
            new Plyr(video, options);
        });
        window.hls = hls;
    } else {
        new Plyr(video, options);
    }
});
</script>

</body>
</html>
