<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEMCODE LIVE | Premium Streaming</title>

<link rel="icon" href="https://fancode.com/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
/* ===================== GLOBAL ===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at top, #111 0%, #000 70%);
    color: #f5f5f5;
    overflow-x: hidden;
}

/* ===================== GOLD THEME ===================== */
:root {
    --gold: #d4af37;
    --gold-soft: #f7e27e;
    --gold-glow: rgba(212, 175, 55, 0.7);
    --dark: #0b0b0b;
}

/* ===================== HEADER ===================== */
header {
    padding: 70px 20px 40px;
    text-align: center;
}

header h1 {
    font-size: 3.2rem;
    font-weight: 900;
    background: linear-gradient(90deg, #f7e27e, #d4af37, #b68c2e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    color: #ccc;
    margin-top: 10px;
    font-size: 1.1rem;
}

/* ===================== STATS ===================== */
.stats {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.stat-box {
    background: linear-gradient(145deg, #111, #1a1a1a);
    border: 1px solid rgba(212,175,55,.35);
    padding: 20px 28px;
    border-radius: 14px;
    text-align: center;
    min-width: 160px;
    box-shadow: 0 0 20px rgba(212,175,55,.25);
}

.stat-box h2 {
    color: var(--gold);
    font-size: 2rem;
}

.stat-box span {
    color: #aaa;
    font-size: 0.85rem;
}

/* ===================== MATCH GRID ===================== */
.grid {
    max-width: 1300px;
    margin: 60px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
}

.card {
    background: linear-gradient(145deg, #0c0c0c, #151515);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.35);
    transition: 0.4s ease;
    box-shadow: 0 0 30px rgba(212,175,55,0.15);
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 0 50px rgba(212,175,55,0.5);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 18px;
}

.card h3 {
    font-size: 1.2rem;
    margin-bottom: 10px;
}

.badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd966, #cfa531);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
}

.watch-btn {
    margin-top: 12px;
    display: block;
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-weight: 700;
    color: #000;
    background: linear-gradient(135deg, #f7e27e, #d4af37);
    text-decoration: none;
    box-shadow: 0 0 20px rgba(212,175,55,.6);
    transition: 0.3s;
}

.watch-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 35px rgba(255,215,120,.9);
}

/* ===================== POPUP ===================== */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.popup-box {
    background: linear-gradient(145deg,#0b0b0b,#1a1a1a);
    border: 1px solid rgba(212,175,55,0.4);
    padding: 30px;
    border-radius: 18px;
    text-align: center;
    max-width: 360px;
}

.popup-box h2 {
    color: var(--gold);
}

.popup-box a {
    display: block;
    margin-top: 15px;
    padding: 12px;
    background: linear-gradient(135deg,#f7e27e,#d4af37);
    color: #000;
    font-weight: 700;
    text-decoration: none;
    border-radius: 10px;
}

/* ===================== FOOTER ===================== */
footer {
    text-align: center;
    padding: 40px 10px;
    color: #777;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>FEMCODE LIVE</h1>
    <p>Premium Black & Gold Streaming Experience</p>

    <div class="stats">
        <div class="stat-box"><h2>12</h2><span>Live Matches</span></div>
        <div class="stat-box"><h2>34</h2><span>Upcoming</span></div>
        <div class="stat-box"><h2>120+</h2><span>Total Streams</span></div>
    </div>
</header>

<section class="grid">
    <div class="card">
        <img src="https://fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg">
        <div class="card-content">
            <span class="badge">LIVE</span>
            <h3>India vs Australia</h3>
            <a href="#" class="watch-btn">Watch Now</a>
        </div>
    </div>

    <div class="card">
        <img src="https://fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg">
        <div class="card-content">
            <span class="badge">UPCOMING</span>
            <h3>England vs Pakistan</h3>
            <a href="#" class="watch-btn">Watch Soon</a>
        </div>
    </div>
</section>

<footer>
    © 2025 FEMCODE • Premium Streaming Experience
</footer>

</body>
</html>
